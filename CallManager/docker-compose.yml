version: '3.8'

services:
  # Call Manager (Spring Boot)

  call-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haru-call-manager
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}

    networks:
      - haru-network
    volumes:
      - ./logs:/app/logs
      
networks:
  haru-network:
    driver: bridge

volumes:
  mysql_data:

  # AI Core (FastAPI) - Optional
