syntax = "proto3";

package ai.inference;

option java_multiple_files = true;
option java_package = "com.haru_anbu.CallManager.grpc";
option java_outer_classname = "VoiceStreamProto";

// AI 음성 대화 서비스
service VoiceConversation {
  // 양방향 스트리밍: 실시간 음성 데이터를 주고받음
  rpc StreamConversation(stream VoiceRequest) returns (stream VoiceResponse);
}

// 클라이언트 -> AI 서버 요청
message VoiceRequest {
  oneof payload {
    SessionConfig config = 1;   // 세션 시작 시 1회 전송
    bytes audio_content = 2;    // 실시간 20-50ms PCM 데이터
  }
}

// 세션 설정
message SessionConfig {
  string user_id = 1;           // DB 고유 식별자
  string session_id = 2;        // Call Manager가 생성한 세션 ID
  int32 sample_rate = 3;        // 16000 권장
  string language_code = 4;     // "ko-KR"
  string phone_number = 5;      // 전화번호 (옵션)
}

// AI 서버 -> 클라이언트 응답
message VoiceResponse {
  oneof payload {
    bytes audio_output = 1;     // AI 목소리 조각 (Chunk)
    string transcript = 2;      // 어르신 말 자막
    string ai_response = 3;     // AI 답변 텍스트
    bool is_final = 4;          // 한 문장 대화 종료 여부
  }
}