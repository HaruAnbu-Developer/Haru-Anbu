spring:
  application:
    name: CallManager
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/haru_call_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:haruPass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    properties:
      hibernate.default_schema: call_manager
    hibernate:
      ddl-auto: update
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  # Jackson JSON Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
    default-property-inclusion: non_null

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

# Twilio Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}
  webhook-base-url: ${WEBHOOK_BASE_URL:https://your-domain.com}

# AI Core Configuration
ai-core:
  base-url: ${AI_CORE_BASE_URL:http://localhost:8001}
  websocket-url: ${AI_CORE_WEBSOCKET_URL:ws://localhost:8001/ws/chat}
  timeout: ${AI_CORE_TIMEOUT:30000}
  retry:
    max-attempts: 3
    backoff-delay: 1000

# Call Configuration
call:
  max-duration-minutes: ${CALL_MAX_DURATION_MINUTES:30}
  recording-enabled: ${CALL_RECORDING_ENABLED:true}
  audio-format: ${CALL_AUDIO_FORMAT:mulaw}
  sample-rate: ${CALL_SAMPLE_RATE:8000}
  buffer-size: 160  # 20ms @ 8kHz
  stream-timeout: 5000

# Logging Configuration
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.haru_anbu: ${LOGGING_LEVEL_COM_HARU_ANBU:DEBUG}
    com.twilio: ${LOGGING_LEVEL_COM_TWILIO:DEBUG}
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/call-manager.log
    max-size: 10MB
    max-history: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.haru_anbu: DEBUG
    org.springframework.web: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.haru_anbu: INFO
    org.springframework.web: WARN