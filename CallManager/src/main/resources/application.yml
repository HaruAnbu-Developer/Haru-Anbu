spring:
  application:
    name: CallManager
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  # Jackson JSON Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
    default-property-inclusion: non_null

# aws dev environment configuration (임시!!!)
aws:
  s3:
    use-path-style-access: true
    bucket-name: ${AWS_S3_BUCKET_NAME:haru-anbu-voice-storage}
    region: ${AWS_S3_REGION:ap-southeast-2}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

# Twilio Configuration
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}
  webhook-base-url: ${WEBHOOK_BASE_URL}

# gRPC Configuration
grpc:
  ai-service:
    host: ${GRPC_AI_SERVICE_HOST:localhost} # TODO: 임시 하드코딩
    port: ${GRPC_AI_SERVICE_PORT:50051}
    max-inbound-message-size: 10485760  # 10MB
    keepalive-time: 30  # seconds
    keepalive-timeout: 10  # seconds
    enable-retry: true
    max-retry-attempts: 3

# AI Core Configuration (deprecated - use gRPC)
ai-core:
  base-url: ${AI_CORE_BASE_URL:http://localhost:8001}
  websocket-url: ${AI_CORE_WEBSOCKET_URL:ws://localhost:8001/ws/chat}
  timeout: ${AI_CORE_TIMEOUT:30000}
  retry:
    max-attempts: 3
    backoff-delay: 1000
  api-key: ${AI_CORE_API_KEY}
  timeout-seconds: ${AI_CORE_TIMEOUT_SECONDS:30}

# Call Configuration
call:
  max-duration-minutes: ${CALL_MAX_DURATION_MINUTES:10}
  recording-enabled: ${CALL_RECORDING_ENABLED:true}
  audio-format: ${CALL_AUDIO_FORMAT:mulaw}
  sample-rate: ${CALL_SAMPLE_RATE:8000}
  buffer-size: 160
  stream-timeout: 5000
  session-cleanup:
    enabled: true
    timeout-minutes: 35  # max-duration + 5 min buffer
    schedule-cron: "0 */10 * * * *"  # every 10 minutes

# Logging Configuration
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.haru_anbu: ${LOGGING_LEVEL_COM_HARU_ANBU:DEBUG}
    com.twilio: ${LOGGING_LEVEL_COM_TWILIO:DEBUG}
    io.grpc: ${LOGGING_LEVEL_IO_GRPC:INFO}
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/call-manager.log
    max-size: 10MB
    max-history: 30

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

grpc:
  ai-service:
    host: localhost
    port: 50051

logging:
  level:
    com.haru_anbu: DEBUG
    org.springframework.web: DEBUG
    io.grpc: DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

grpc:
  ai-service:
    host: ${GRPC_AI_SERVICE_HOST}
    port: ${GRPC_AI_SERVICE_PORT}

logging:
  level:
    com.haru_anbu: INFO
    org.springframework.web: WARN
    io.grpc: WARN
  